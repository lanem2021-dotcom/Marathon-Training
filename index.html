<title>Marathon — Nov 22</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1923; --surface: #1a2533; --surface2: #243040;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #e8f4f8; --muted: #7a9ab0; --accent: #3a7bd5;
    --accent-light: #5b9af0; --green: #1D9E75; --amber: #d4893a;
    --pink: #c75c8a; --gray: #5a6a78;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
  .header { padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .header-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .countdown-pill { background: var(--accent); color: white; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
  .progress-bar-wrap { margin-bottom: 4px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .progress-track { height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 2px; transition: width 0.4s; }
  .nav-tabs { display: flex; gap: 4px; padding: 10px 20px 0; border-bottom: 0.5px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: none; border: none; color: var(--muted); font-size: 13px; font-weight: 500; padding: 6px 12px 10px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -0.5px; transition: color 0.15s; -webkit-tap-highlight-color: transparent; }
  .tab-btn.active { color: var(--accent-light); border-bottom-color: var(--accent-light); }
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px 20px 24px; }
  .phase-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 20px 0 8px; }
  .phase-label:first-child { margin-top: 0; }
  .week-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--surface); border-radius: 10px; margin-bottom: 6px; cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s, background 0.15s; -webkit-tap-highlight-color: transparent; }
  .week-row:active { background: var(--surface2); }
  .week-row.current { border-color: var(--accent); }
  .week-row.completed { opacity: 0.55; }
  .week-num { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .week-num.done { background: var(--surface2); color: var(--muted); }
  .week-num.now { background: var(--accent); color: white; }
  .week-num.upcoming { background: var(--surface2); color: var(--text); }
  .week-num.recovery { background: rgba(90,106,120,0.3); color: var(--gray); }
  .week-info { flex: 1; min-width: 0; }
  .week-info-top { display: flex; align-items: baseline; gap: 8px; }
  .week-name { font-size: 14px; font-weight: 500; }
  .week-tag { font-size: 11px; color: var(--muted); }
  .week-dates { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .week-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .week-miles-badge { font-size: 14px; font-weight: 700; color: var(--text); }
  .week-miles-badge span { font-size: 11px; font-weight: 400; color: var(--muted); }
  .week-completion-dots { display: flex; gap: 3px; }
  .wc-dot { width: 6px; height: 6px; border-radius: 50%; }
  .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .back-btn { background: var(--surface); border: none; color: var(--accent-light); font-size: 14px; padding: 7px 12px; border-radius: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .detail-week-title { font-size: 18px; font-weight: 700; }
  .detail-subtitle { font-size: 13px; color: var(--muted); }
  .day-card { background: var(--surface); border-radius: 10px; margin-bottom: 6px; overflow: hidden; border: 1px solid transparent; transition: border-color 0.2s, opacity 0.2s; }
  .day-card.day-done { border-color: rgba(29,158,117,0.4); opacity: 0.75; }
  .day-card.day-missed { border-color: rgba(212,137,58,0.35); }
  .day-card-inner { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .day-check-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); background: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; font-size: 13px; }
  .day-check-btn.checked { background: var(--green); border-color: var(--green); }
  .day-check-btn.missed { background: rgba(212,137,58,0.25); border-color: var(--amber); }
  .day-check-btn.rest-check { border-color: rgba(255,255,255,0.12); }
  .day-check-btn.rest-check.checked { background: var(--gray); border-color: var(--gray); }
  .day-col { flex: 1; }
  .day-name-text { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
  .day-desc-text { font-size: 14px; color: var(--text); line-height: 1.45; }
  .day-desc-text.rest-text { color: var(--muted); }
  .day-desc-text.done-text { text-decoration: line-through; color: var(--muted); }
  .day-status-label { font-size: 10px; margin-top: 3px; font-weight: 500; }
  .day-status-label.done-label { color: var(--green); }
  .day-status-label.missed-label { color: var(--amber); }
  .tip-card { background: rgba(58,123,213,0.12); border: 0.5px solid rgba(58,123,213,0.3); border-radius: 10px; padding: 12px 14px; margin-top: 16px; font-size: 13px; color: #a8c8f0; line-height: 1.6; }
  .tip-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent-light); margin-bottom: 6px; }
  .today-hero { background: var(--surface); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .today-wk-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .today-day-name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
  .today-workout { font-size: 15px; color: var(--muted); line-height: 1.5; margin-bottom: 14px; }
  .today-check-row { display: flex; gap: 8px; }
  .today-check-big { flex: 1; padding: 10px; border-radius: 9px; border: 1.5px solid var(--border2); background: none; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s, border-color 0.15s; }
  .today-check-big.btn-done { background: rgba(29,158,117,0.2); border-color: var(--green); color: var(--green); }
  .today-check-big.btn-missed { background: rgba(212,137,58,0.15); border-color: var(--amber); color: var(--amber); }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 14px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-unit { font-size: 12px; color: var(--muted); font-weight: 400; }
  .next-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .next-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .next-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-top: 0.5px solid var(--border); }
  .next-item:first-of-type { border-top: none; }
  .next-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .next-text { font-size: 13px; color: var(--text); flex: 1; }
  .next-day-label { font-size: 11px; color: var(--muted); }
  .tips-section { margin-bottom: 24px; }
  .tips-section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--accent-light); }
  .tip-item { background: var(--surface); border-radius: 10px; padding: 13px 14px; margin-bottom: 6px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .tip-item strong { color: var(--text); font-weight: 500; }
  .race-countdown { background: linear-gradient(135deg, #0d2240, #1a3a5c); border: 0.5px solid rgba(58,123,213,0.4); border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 16px; }
  .race-days { font-size: 52px; font-weight: 800; letter-spacing: -2px; color: var(--accent-light); }
  .race-days-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .race-date-text { font-size: 14px; color: var(--text); margin-top: 8px; }
  .log-summary { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
  .log-stat-val { font-size: 20px; font-weight: 700; }
  .log-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .log-stat-val.green { color: var(--green); }
  .log-stat-val.amber { color: var(--amber); }
  .log-stat-val.blue { color: var(--accent-light); }
  .week-progress-row { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }
  .wp-dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>

  {id:"taper",name:"Taper",color:"#5a6a78",tip:"The taper is real and it works. You may feel sluggish or anxious — that is normal (runners call it taper madness). Your legs are storing glycogen and recovering. Do not add extra miles to feel better. Rest is training.",weeks:[
    {n:20,miles:30,tag:"Taper begins",rest:false,days:[{d:"Mon",t:"Rest"},{d:"Tue",t:"6 mi easy run"},{d:"Wed",t:"5 mi with 3 mi at marathon pace"},{d:"Thu",t:"5 mi easy run"},{d:"Fri",t:"Rest"},{d:"Sat",t:"13 mi long run"},{d:"Sun",t:"Rest"}]},
    {n:21,miles:22,tag:"Taper",rest:false,days:[{d:"Mon",t:"Rest"},{d:"Tue",t:"5 mi easy run"},{d:"Wed",t:"4 mi with 2 mi at marathon pace"},{d:"Thu",t:"4 mi easy run"},{d:"Fri",t:"Rest"},{d:"Sat",t:"10 mi easy run"},{d:"Sun",t:"Rest"}]},
    {n:22,miles:14,tag:"Taper",rest:false,days:[{d:"Mon",t:"Rest"},{d:"Tue",t:"4 mi easy run"},{d:"Wed",t:"3 mi easy with 4 strides"},{d:"Thu",t:"3 mi easy run"},{d:"Fri",t:"Rest"},{d:"Sat",t:"6 mi easy run"},{d:"Sun",t:"Rest"}]}
  ]},
  {id:"race",name:"Race week",color:"#c75c8a",tip:"Nothing new on race day — not shoes, socks, food, or pace strategy. Eat familiar foods. Sleep is most important Sunday and Monday before the race. Hydrate all week. Lay out your kit Friday night.",weeks:[
    {n:23,miles:8,tag:"Race week",rest:false,days:[{d:"Mon",t:"Rest — light walk only"},{d:"Tue",t:"3 mi easy shakeout run"},{d:"Wed",t:"2 mi easy + 4 strides"},{d:"Thu",t:"Rest"},{d:"Fri",t:"2 mi very easy jog + strides, stay off feet rest of day"},{d:"Sat",t:"Rest — eat well, sleep early"},{d:"Sun",t:"RACE DAY — Nov 22, 2026"}]}
  ]}
];
const ALL_WEEKS=[];
PHASES.forEach(ph=>ph.weeks.forEach(wk=>ALL_WEEKS.push({...wk,phase:ph})));
function getWeekStart(n){const d=new Date(TRAIN_START);d.setDate(d.getDate()+(n-1)*7);return d;}
function getCurrentWeek(){const e=new Date()-TRAIN_START;if(e<0)return 1;return Math.min(Math.floor(e/(7*24*60*60*1000))+1,23);}
function getDaysUntilRace(){return Math.max(0,Math.ceil((RACE_DATE-new Date())/(1000*60*60*24)));}
function getTodayDayIndex(){return new Date().getDay();}
function formatWeekDates(n){const s=getWeekStart(n);const e=new Date(s);e.setDate(e.getDate()+6);const f=d=>d.toLocaleDateString("en-US",{month:"short",day:"numeric"});return f(s)+" - "+f(e);}
const JS_TO_ARR=[6,0,1,2,3,4,5];
function getGlobalStats(){let done=0,missed=0,total=0;const curWk=getCurrentWeek();const todayArrIdx=JS_TO_ARR[getTodayDayIndex()];ALL_WEEKS.forEach(wk=>{wk.days.forEach((d,di)=>{const isPast=wk.n<curWk||(wk.n===curWk&&di<todayArrIdx);if(!isPast)return;total++;const s=getDayStatus(wk.n,di);if(s==="done")done++;else if(s==="missed")missed++;});});return{done,missed,total};}
function getWeekDots(wk){return wk.days.map((d,di)=>{const s=getDayStatus(wk.n,di);if(s==="done")return"#1D9E75";if(s==="missed")return"#d4893a";const isRest=d.t.toLowerCase().startsWith("rest");return isRest?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.18)";});}
function getDayColor(desc,pc){if(!desc||desc.toLowerCase().includes("rest"))return"#5a6a78";if(desc.toLowerCase().includes("race day"))return"#c75c8a";if(desc.toLowerCase().includes("long run")||desc.toLowerCase().includes("peak"))return"#d4893a";if(desc.toLowerCase().includes("tempo")||desc.toLowerCase().includes("marathon pace"))return"#1D9E75";if(desc.toLowerCase().includes("cross"))return"#3a7bd5";return pc;}
let currentTab="today",detailWeek=null;
function showTab(tab){currentTab=tab;detailWeek=null;document.querySelectorAll(".tab-btn").forEach((b,i)=>{b.classList.toggle("active",["today","plan","tips"][i]===tab);});render();}
function render(){const el=document.getElementById("main-content");if(detailWeek!==null){renderDetail(el);return;}if(currentTab==="today")renderToday(el);else if(currentTab==="plan")renderPlan(el);else renderTips(el);}
function renderToday(el){
  const curWk=getCurrentWeek();const wkData=ALL_WEEKS.find(w=>w.n===curWk);
  if(!wkData){el.innerHTML='<p style="color:var(--muted);text-align:center;padding:40px">Training complete! Go run 26.2.</p>';return;}
  const jsDay=getTodayDayIndex();const arrIdx=JS_TO_ARR[jsDay];const todayDay=wkData.days[arrIdx];
  const dayNames=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const todayName=dayNames[arrIdx];const status=getDayStatus(curWk,arrIdx);
  const isRest=todayDay&&todayDay.t.toLowerCase().startsWith("rest");
  const upcoming=[];
  for(let i=1;i<=3;i++){const nextJs=(jsDay+i)%7;const nextArr=JS_TO_ARR[nextJs];let nextWkData=wkData;if(nextArr<arrIdx){nextWkData=ALL_WEEKS.find(w=>w.n===curWk+1)||wkData;}const nd=nextWkData.days[nextArr];upcoming.push({name:dayNames[nextArr],desc:nd?nd.t:"Rest"});}
  const stats=getGlobalStats();
  el.innerHTML=`<div class="today-hero"><div class="today-wk-label">Week ${curWk} of 23 · ${wkData.phase.name}</div><div class="today-day-name">${todayName}</div><div class="today-workout">${todayDay?todayDay.t:"Rest"}</div><div class="today-check-row"><button class="today-check-big ${status==="done"?"btn-done":""}" onclick="toggleTodayStatus('done',${curWk},${arrIdx})">${status==="done"?"✓ Done":"Mark done"}</button>${!isRest?`<button class="today-check-big ${status==="missed"?"btn-missed":""}" onclick="toggleTodayStatus('missed',${curWk},${arrIdx})">${status==="missed"?"✕ Missed":"Mark missed"}</button>`:""}</div></div><div class="log-summary"><div><div class="log-stat-val green">${stats.done}</div><div class="log-stat-lbl">Completed</div></div><div><div class="log-stat-val amber">${stats.missed}</div><div class="log-stat-lbl">Missed</div></div><div><div class="log-stat-val blue">${stats.total-stats.done-stats.missed}</div><div class="log-stat-lbl">Unlogged</div></div></div><div class="stat-row"><div class="stat-card"><div class="stat-label">Days to race</div><div class="stat-value">${getDaysUntilRace()}<span class="stat-unit"> days</span></div></div><div class="stat-card"><div class="stat-label">This week's miles</div><div class="stat-value">${wkData.miles}<span class="stat-unit"> mi</span></div></div></div><div class="next-card"><div class="next-label">Coming up</div>${upcoming.map(u=>`<div class="next-item"><div class="next-dot"></div><div class="next-text">${u.desc}</div><div class="next-day-label">${u.name}</div></div>`).join("")}</div><div class="tip-card"><div class="tip-label">Phase tip</div>${wkData.phase.tip}</div>`;
}
function toggleTodayStatus(newStatus,wn,di){const cur=getDayStatus(wn,di);setDayStatus(wn,di,cur===newStatus?"":newStatus);render();}
function renderPlan(el){
  const curWk=getCurrentWeek();let html="";
  PHASES.forEach(ph=>{html+=`<div class="phase-label">${ph.name}</div>`;ph.weeks.forEach(wk=>{const isCurrent=wk.n===curWk,isDone=wk.n<curWk;const numClass=isDone?"done":isCurrent?"now":wk.rest?"recovery":"upcoming";const dots=getWeekDots(wk);html+=`<div class="week-row ${isCurrent?"current":""} ${isDone?"completed":""}" onclick="openWeek(${wk.n})"><div class="week-num ${numClass}">${isDone?"✓":wk.n}</div><div class="week-info"><div class="week-info-top"><span class="week-name">Week ${wk.n}</span><span class="week-tag">${wk.tag}</span></div><div class="week-dates">${formatWeekDates(wk.n)}</div></div><div class="week-right"><div class="week-miles-badge">${wk.miles} <span>mi</span></div><div class="week-completion-dots">${dots.map(c=>`<div class="wc-dot" style="background:${c}"></div>`).join("")}</div></div></div>`;});});
  el.innerHTML=html;
}
function openWeek(n){detailWeek=n;render();}
function renderDetail(el){
  const wk=ALL_WEEKS.find(w=>w.n===detailWeek);if(!wk)return;const ph=wk.phase;
  const curWk=getCurrentWeek();const jsDay=getTodayDayIndex();const todayArrIdx=JS_TO_ARR[jsDay];
  const days=wk.days.map((d,di)=>{
    const isRest=d.t.toLowerCase().startsWith("rest");const status=getDayStatus(wk.n,di);
    const isDone=status==="done";const isMissed=status==="missed";
    const isToday=wk.n===curWk&&di===todayArrIdx;
    let cardClass="day-card";if(isDone)cardClass+=" day-done";else if(isMissed)cardClass+=" day-missed";
    let checkClass="day-check-btn";if(isRest)checkClass+=" rest-check";if(isDone)checkClass+=" checked";else if(isMissed)checkClass+=" missed";
    const checkIcon=isDone?"✓":isMissed?"✕":"";
    let statusLabel="";if(isDone)statusLabel=`<div class="day-status-label done-label">completed</div>`;else if(isMissed)statusLabel=`<div class="day-status-label missed-label">missed</div>`;else if(isToday)statusLabel=`<div class="day-status-label" style="color:var(--accent-light)">today</div>`;
    const descClass="day-desc-text"+(isRest?" rest-text":"")+(isDone?" done-text":"");
    const nextStatus=isDone?(isRest?"":"missed"):(isMissed?"":"done");
    return `<div class="${cardClass}"><div class="day-card-inner"><button class="${checkClass}" onclick="cycleDayStatus(${wk.n},${di},'${nextStatus}')">${checkIcon}</button><div class="day-col"><div class="day-name-text">${d.d}${isToday?" · today":""}</div><div class="${descClass}">${d.t}</div>${statusLabel}</div></div></div>`;
  }).join("");
  const dots=getWeekDots(wk);const dotRow=dots.map((c,i)=>`<div class="wp-dot" style="background:${c}"></div>`).join("");
  el.innerHTML=`<div class="detail-header"><button class="back-btn" onclick="detailWeek=null;render()">← Back</button><div><div class="detail-week-title">Week ${wk.n} · ${wk.miles} mi</div><div class="detail-subtitle" style="color:${ph.color}">${ph.name} · ${wk.tag}</div></div></div><div style="color:var(--muted);font-size:12px;margin-bottom:10px">${formatWeekDates(wk.n)}</div><div class="week-progress-row">${dotRow}</div>${days}<div class="tip-card"><div class="tip-label">Phase tip</div>${ph.tip}</div>`;
  el.scrollTop=0;
}
function cycleDayStatus(wn,di,nextStatus){setDayStatus(wn,di,nextStatus);renderDetail(document.getElementById("main-content"));updateHeader();}
function renderTips(el){
  el.innerHTML=`<div class="race-countdown"><div class="race-days">${getDaysUntilRace()}</div><div class="race-days-label">days until race day</div><div class="race-date-text">Saturday, November 22, 2026</div></div><div class="tips-section"><div class="tips-section-title">Shoes & ankle</div><div class="tip-item"><strong>Get a gait analysis.</strong> Go to a specialty running store before week 1. They'll put you on a treadmill and match you to a stability shoe for your pronation.</div><div class="tip-item"><strong>Recommended shoes:</strong> ASICS GT-2000, Brooks Adrenaline GTS, New Balance 860, or Saucony Guide. These provide medial support without being overly corrective.</div><div class="tip-item"><strong>Rotate two pairs</strong> once you're in the build phase. Alternating shoes extends foam life and reduces repetitive stress.</div></div><div class="tips-section"><div class="tips-section-title">Easy pace rule</div><div class="tip-item"><strong>80% of runs should be easy.</strong> You should be able to say full sentences without gasping. Most athletic people run too fast, burn out, and get injured. Resist the urge.</div><div class="tip-item"><strong>Tempo pace</strong> is comfortably hard — you can say a few words but not a paragraph. Used on Wednesday workouts in the build and peak phases.</div></div><div class="tips-section"><div class="tips-section-title">Fueling long runs</div><div class="tip-item"><strong>Start fueling at mile 6.</strong> Take a gel or chew every 45 minutes after that. Train your gut on long runs — don't use a new gel on race day.</div><div class="tip-item"><strong>Hydrate every 20 minutes</strong> on runs over 60 minutes. Carry a handheld water bottle or plan a route with water fountains.</div><div class="tip-item"><strong>Carb-load 2 days before</strong> your long runs, not just the night before. Pasta, rice, bread — familiar foods only.</div></div><div class="tips-section"><div class="tips-section-title">Tennis + running</div><div class="tip-item"><strong>Tennis counts as cross-training</strong> in weeks 1-6. In weeks 7+, treat hard tennis sessions as a workout day and protect your long-run recovery.</div><div class="tip-item"><strong>Don't play a hard match and long run the same day.</strong> Your ankles and calves need 24-48 hours between high-impact sessions early on.</div></div><div class="tips-section"><div class="tips-section-title">Warning signs</div><div class="tip-item"><strong>Inside ankle pain</strong> (posterior tibial tendinitis) is the classic pronation injury. Back off immediately, ice, and rest 2-3 days before returning.</div><div class="tip-item"><strong>IT band pain</strong> on the outside of the knee: foam roll your IT band, glutes, and TFL. Add hip strengthening (clamshells, side-lying raises).</div><div class="tip-item"><strong>Shin splints:</strong> reduce mileage 25%, run on softer surfaces, check that your shoes aren't worn out.</div></div><div class="tips-section"><div class="tips-section-title">Race day</div><div class="tip-item"><strong>Nothing new on race day</strong> — not shoes, socks, nutrition, or clothing. Everything should be tested in training.</div><div class="tip-item"><strong>Start slow.</strong> The crowd energy will pull you out faster than planned. Your first mile should feel embarrassingly easy.</div><div class="tip-item"><strong>Break the race into thirds:</strong> miles 1-9 conservative, miles 10-18 steady, miles 19-26 give what you have left.</div></div>`;
}
function updateHeader(){document.getElementById("countdown-pill").textContent=getDaysUntilRace()+"d out";const curWk=getCurrentWeek();const pct=Math.min(100,Math.round((curWk-1)/23*100));document.getElementById("progress-fill").style.width=pct+"%";document.getElementById("progress-pct").textContent=pct+"%";}
updateHeader();render();
</script>
</body>
</html>
